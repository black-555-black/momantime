<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シャンチー・シミュレーター v1.6.1-Minimal</title>
    <style>
        :root {
            --board-bg: #f5deb3;
            --river-bg: rgba(100, 180, 255, 0.3);
            --line-color: #5d4037;
            --blue-piece: radial-gradient(circle at 30% 30%, #4a90e2, #1a5a9e);
            --red-piece: radial-gradient(circle at 30% 30%, #e74c3c, #96281b);
        }
        html, body { 
            position: fixed; width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none;
        }
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #2c3e50; 
            margin: 0; padding: 10px; font-family: sans-serif; touch-action: none; color: white;
        }
        #game-container { 
            width: 90vw; max-width: 360px; aspect-ratio: 360 / 400; 
            position: relative; background-color: var(--board-bg); 
            border: 4px double var(--line-color); box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            box-sizing: border-box;
        }
        #board-grid { position: absolute; top: 5%; left: 5%; right: 5%; bottom: 5%; background-image: linear-gradient(var(--line-color) 1px, transparent 1px), linear-gradient(90deg, var(--line-color) 1px, transparent 1px); background-size: 100% 12.5%, 14.2857% 100%; border-right: 1px solid var(--line-color); border-bottom: 1px solid var(--line-color); pointer-events: none; -webkit-mask-image: linear-gradient(to bottom, black 37.5%, transparent 37.5%, transparent 50%, black 50%); mask-image: linear-gradient(to bottom, black 37.5%, transparent 37.5%, transparent 50%, black 50%); }
        #board-lines-h, #board-outline { position: absolute; top: 5%; left: 5%; right: 5%; bottom: 5%; pointer-events: none; }
        #board-lines-h { background-image: linear-gradient(var(--line-color) 1px, transparent 1px); background-size: 100% 12.5%; }
        #board-outline { border-left: 1px solid var(--line-color); border-right: 1px solid var(--line-color); }
        #river { position: absolute; top: 38.75%; left: 5%; right: 5%; height: 11.25%; background-color: var(--river-bg); pointer-events: none; }
        .point { position: absolute; width: 6px; height: 6px; background-color: var(--line-color); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.4; z-index: 2; }
        .piece-ui { 
            width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            color: white; font-weight: 900; font-size: 18px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); user-select: none; -webkit-user-select: none;
        }
        .piece-ui.blue { background: var(--blue-piece); }
        .piece-ui.red { background: var(--red-piece); }
        .piece { position: absolute; transform: translate(-50%, -50%); cursor: grab; z-index: 10; touch-action: none; }
        .danger-piece { animation: piece-danger-blink 0.8s infinite alternate; border: 2px solid #ff4444; }
        @keyframes piece-danger-blink { from { box-shadow: 0 0 5px #f00; } to { box-shadow: 0 0 25px #f00; transform: translate(-50%, -50%) scale(1.08); } }
        .marker { border-radius: 50%; position: absolute; transform: translate(-50%, -50%); pointer-events: none; z-index: 15; border: 2px solid #fff; }
        .marker.danger { width: 22px; height: 22px; background-color: rgba(255, 68, 68, 0.8); }
        .marker.safe { width: 22px; height: 22px; background-color: rgba(255, 235, 59, 0.8); }
        .marker.best { width: 38px; height: 38px; background-color: rgba(76, 175, 80, 0.4); border: 3px solid #4caf50; animation: pulse-best 1.5s infinite; }
        @keyframes pulse-best { 0%, 100% { transform: translate(-50%, -50%) scale(0.9); } 50% { transform: translate(-50%, -50%) scale(1.1); } }
        #palette { margin-top: 15px; display: flex; gap: 6px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; flex-wrap: wrap; justify-content: center; }
        .palette-item { cursor: pointer; width: 38px; height: 38px; font-size: 12px; touch-action: none; }
        .reset-btn { background: #e74c3c; font-size: 20px; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; border: 2px solid #c0392b; }
        .reset-btn.drag-over { background: #ff0000; transform: scale(1.2); }
    </style>
</head>
<body>
<div id="game-container"><div id="board-grid"></div><div id="board-lines-h"></div><div id="board-outline"></div><div id="river"></div></div>
<div id="palette">
    <div class="palette-item piece-ui blue" data-side="blue" data-type="車">自車</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="卒">卒</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="士">士</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="馬">馬</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="象">象</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="車">車</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="将">将</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="砲">砲</div>
    <div id="trash-can" class="reset-btn">🗑️</div>
</div>
<script>
    const container = document.getElementById('game-container');
    const trashCan = document.getElementById('trash-can');
    const COLS = 8, ROWS = 9;
    let pieces = [], activeDrag = null, draggedPieceId = null;

    const DIRS_4 = [[0, -1], [0, 1], [1, 0], [-1, 0]];
    const DIAG_4 = [[1, -1], [1, 1], [-1, 1], [-1, -1]];
    const HORSE_8 = [[1, -2], [2, -1], [2, 1], [1, 2], [-1, 2], [-2, 1], [-2, -1], [-1, -2]];

    function init() {
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                const dot = document.createElement('div');
                dot.className = 'point';
                dot.style.left = `${5 + (x/7)*90}%`; dot.style.top = `${5 + (y/8)*90}%`;
                container.appendChild(dot);
            }
        }
        setupEvents();
    }

    function setupEvents() {
        document.querySelectorAll('.palette-item').forEach(el => {
            el.onpointerdown = (e) => handleStart(e, el.dataset.side, el.dataset.type);
        });
        trashCan.onclick = resetBoard;
        window.onpointermove = handleMove;
        window.onpointerup = handleEnd;
    }

    function handleStart(e, side, type, id = null) {
        e.preventDefault();
        draggedPieceId = id;
        const pData = pieces.find(p => p.id === id);
        activeDrag = { 
            side, type, id, 
            startX: pData ? pData.x : -1, startY: pData ? pData.y : -1,
            element: createGhost(type, side, e.clientX, e.clientY)
        };
        render();
    }

    function createGhost(type, side, x, y) {
        const ghost = document.createElement('div');
        ghost.className = `piece-ui ${side}`; ghost.innerText = type;
        ghost.style.position = 'fixed'; ghost.style.left = x + 'px'; ghost.style.top = y + 'px';
        ghost.style.transform = 'translate(-50%, -50%) scale(1.2)'; ghost.style.opacity = '0.8';
        ghost.style.zIndex = '1000'; ghost.style.pointerEvents = 'none';
        document.body.appendChild(ghost);
        return ghost;
    }

    function handleMove(e) {
        if (!activeDrag) return;
        activeDrag.element.style.left = e.clientX + 'px';
        activeDrag.element.style.top = e.clientY + 'px';
        const tRect = trashCan.getBoundingClientRect();
        if (e.clientX >= tRect.left && e.clientX <= tRect.right && e.clientY >= tRect.top && e.clientY <= tRect.bottom) trashCan.classList.add('drag-over');
        else trashCan.classList.remove('drag-over');
    }

    function handleEnd(e) {
        if (!activeDrag) return;
        const rect = container.getBoundingClientRect(), tRect = trashCan.getBoundingClientRect();
        activeDrag.element.remove(); trashCan.classList.remove('drag-over');

        if (e.clientX >= tRect.left && e.clientX <= tRect.right && e.clientY >= tRect.top && e.clientY <= tRect.bottom) {
            if (activeDrag.id) pieces = pieces.filter(p => p.id !== activeDrag.id);
        } else {
            const x = Math.round((((e.clientX - rect.left) / rect.width) - 0.05) / 0.9 * 7);
            const y = Math.round((((e.clientY - rect.top) / rect.height) - 0.05) / 0.9 * 8);
            if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
                if (!(activeDrag.id && activeDrag.startX === x && activeDrag.startY === y)) {
                    if (activeDrag.side === 'blue') pieces = pieces.filter(p => p.side !== 'blue');
                    pieces = pieces.filter(p => !(p.x === x && p.y === y) && p.id !== activeDrag.id);
                    pieces.push({ id: activeDrag.id || Date.now(), side: activeDrag.side, type: activeDrag.type, x, y });
                }
            }
        }
        activeDrag = null; draggedPieceId = null; render();
    }

    function resetBoard() { if(confirm("盤面をリセットしますか？")) { pieces = []; render(); } }

    function getAttackMap(currentPieces) {
        const attackMap = new Set();
        currentPieces.filter(p => p.side === 'red').forEach(p => {
            const add = (x, y) => { if(x>=0 && x<COLS && y>=0 && y<ROWS) attackMap.add(`${x},${y}`); };
            const checkAt = (x, y) => currentPieces.find(o => o.x === x && o.y === y);
            switch(p.type) {
                case '車': DIRS_4.forEach(([dx, dy]) => { for(let i=1; i<10; i++){ let nx=p.x+dx*i, ny=p.y+dy*i; if(nx<0||nx>=COLS||ny<0||ny>=ROWS) break; add(nx, ny); if(checkAt(nx, ny)) break; } }); break;
                case '馬': HORSE_8.forEach(([dx, dy]) => { const cx=dx===2||dx===-2?dx/2:0, cy=dy===2||dy===-2?dy/2:0; if(!currentPieces.some(pc=>pc.x===p.x+cx&&pc.y===p.y+cy)) add(p.x+dx, p.y+dy); }); break;
                case '砲': DIRS_4.forEach(([dx, dy]) => { let count=0; for(let i=1; i<10; i++){ let nx=p.x+dx*i, ny=p.y+dy*i; if(nx<0||nx>=COLS||ny<0||ny>=ROWS) break; const t=checkAt(nx, ny); if(count===0){ if(t) count=1; } else { add(nx, ny); if(t) break; } } }); break;
                case '卒': case '将': DIRS_4.forEach(([dx, dy]) => add(p.x+dx, p.y+dy)); break;
                case '象': DIAG_4.forEach(([dx, dy]) => { if(!currentPieces.some(pc=>pc.x===p.x+dx&&pc.y===p.y+dy)) add(p.x+dx*2, p.y+dy*2); }); break;
                case '士': DIAG_4.forEach(([dx, dy]) => add(p.x+dx, p.y+dy)); break;
            }
        });
        return attackMap;
    }

    function render() {
        container.querySelectorAll('.piece, .marker').forEach(el => el.remove());
        const currentAttackMap = getAttackMap(pieces);
        const myCar = pieces.find(p => p.side === 'blue');
        pieces.forEach(p => {
            if (p.id === draggedPieceId) return;
            const el = document.createElement('div');
            el.className = `piece piece-ui ${p.side}`;
            if (p.side === 'blue' && currentAttackMap.has(`${p.x},${p.y}`)) el.classList.add('danger-piece');
            el.innerText = p.type; el.style.left = `${5 + (p.x/7)*90}%`; el.style.top = `${5 + (p.y/8)*90}%`;
            el.onpointerdown = (e) => handleStart(e, p.side, p.type, p.id);
            container.appendChild(el);
        });
        if (myCar) calculateMoves(myCar);
    }

    function calculateMoves(car) {
        const cands = [];
        DIRS_4.forEach(([dx, dy]) => {
            for (let i = 1; i < 10; i++) {
                let nx=car.x+dx*i, ny=car.y+dy*i; if(nx<0||nx>=COLS||ny<0||ny>=ROWS) break;
                const target = pieces.find(p => p.x === nx && p.y === ny);
                if (target?.side === 'blue') break;
                const future = pieces.map(p => p.side === 'blue' ? { ...p, x: nx, y: ny } : p);
                const isSafe = !getAttackMap(future).has(`${nx},${ny}`);
                let score = isSafe ? 10 : 0;
                if (isSafe && target?.side === 'red') score += 1000;
                cands.push({ x: nx, y: ny, isDanger: !isSafe, score });
                if (target) break;
            }
        });
        const maxS = cands.filter(c => !c.isDanger).length ? Math.max(...cands.filter(c => !c.isDanger).map(c => c.score)) : 0;
        cands.forEach(c => {
            const m = document.createElement('div');
            m.className = `marker ${c.isDanger ? 'danger' : (c.score === maxS && maxS > 0 ? 'best' : 'safe')}`;
            m.style.left = `${5 + (c.x/7)*90}%`; m.style.top = `${5 + (c.y/8)*90}%`;
            container.appendChild(m);
        });
    }
    init();
</script>
</body>
</html>
