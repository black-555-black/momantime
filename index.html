<!-- VERSION: v1.6.1-MobileDragVisualFixed -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シャンチー・シミュレーター v1.6.1</title>
    <style>
        :root {
            --board-bg: #f5deb3;
            --river-bg: rgba(100, 180, 255, 0.3);
            --line-color: #5d4037;
            --blue-piece: radial-gradient(circle at 30% 30%, #4a90e2, #1a5a9e);
            --red-piece: radial-gradient(circle at 30% 30%, #e74c3c, #96281b);
        }
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; }
        body { display: flex; flex-direction: column; align-items: center; background-color: #2c3e50; margin: 0; padding: 10px; font-family: sans-serif; touch-action: none; color: white; }
        
        #score-panel { width: 90vw; max-width: 360px; background: rgba(0, 0, 0, 0.7); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #444; }
        .score-item { text-align: center; flex: 1; }
        .score-value { font-size: 28px; font-weight: bold; color: #4caf50; }
        .score-label { font-size: 11px; opacity: 0.7; letter-spacing: 1px; }

        #game-container { width: 90vw; max-width: 360px; aspect-ratio: 360 / 400; position: relative; background-color: var(--board-bg); border: 4px double var(--line-color); box-shadow: 0 10px 30px rgba(0,0,0,0.6); box-sizing: border-box; }
        #board-grid { position: absolute; top: 5%; left: 5%; right: 5%; bottom: 5%; background-image: linear-gradient(var(--line-color) 1px, transparent 1px), linear-gradient(90deg, var(--line-color) 1px, transparent 1px); background-size: 100% 12.5%, 14.2857% 100%; border-right: 1px solid var(--line-color); border-bottom: 1px solid var(--line-color); pointer-events: none; -webkit-mask-image: linear-gradient(to bottom, black 37.5%, transparent 37.5%, transparent 50%, black 50%); mask-image: linear-gradient(to bottom, black 37.5%, transparent 37.5%, transparent 50%, black 50%); }
        #board-lines-h { position: absolute; top: 5%; left: 5%; right: 5%; bottom: 5%; background-image: linear-gradient(var(--line-color) 1px, transparent 1px); background-size: 100% 12.5%; pointer-events: none; }
        #board-outline { position: absolute; top: 5%; left: 5%; right: 5%; bottom: 5%; border-left: 1px solid var(--line-color); border-right: 1px solid var(--line-color); pointer-events: none; }
        #river { position: absolute; top: 38.75%; left: 5%; right: 5%; height: 11.25%; background-color: var(--river-bg); pointer-events: none; }
        
        .point { position: absolute; width: 6px; height: 6px; background-color: var(--line-color); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.4; z-index: 2; }
        
        .piece-ui { width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 18px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); box-shadow: 0 4px 8px rgba(0,0,0,0.4); user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        .piece-ui.blue { background: var(--blue-piece); }
        .piece-ui.red { background: var(--red-piece); }
        .piece { position: absolute; transform: translate(-50%, -50%); cursor: grab; z-index: 10; touch-action: none; }
        
        .danger-piece { animation: piece-danger-blink 0.8s infinite alternate; border: 2px solid #ff4444; box-sizing: border-box; }
        @keyframes piece-danger-blink { from { box-shadow: 0 0 5px #f00; } to { box-shadow: 0 0 25px #f00; transform: translate(-50%, -50%) scale(1.08); } }

        .marker { border-radius: 50%; position: absolute; transform: translate(-50%, -50%); pointer-events: none; z-index: 15; border: 2px solid #fff; }
        .marker.danger { width: 22px; height: 22px; background-color: rgba(255, 68, 68, 0.8); animation: blink 1s infinite; }
        .marker.safe { width: 22px; height: 22px; background-color: rgba(255, 235, 59, 0.8); }
        .marker.best { width: 38px; height: 38px; background-color: rgba(76, 175, 80, 0.4); border: 3px solid #4caf50; box-shadow: 0 0 15px #4caf50; animation: pulse-best 1.5s infinite; }
        @keyframes pulse-best { 0%, 100% { transform: translate(-50%, -50%) scale(0.9); } 50% { transform: translate(-50%, -50%) scale(1.1); } }

        #palette { margin-top: 15px; display: flex; gap: 6px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; flex-wrap: wrap; justify-content: center; max-width: 420px; }
        .palette-item { cursor: pointer; width: 38px; height: 38px; font-size: 12px; touch-action: none; }
        .reset-btn { background: #e74c3c; font-size: 20px; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; border: 2px solid #c0392b; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div id="score-panel">
    <div class="score-item"><div class="score-label">BEST MOVE SCORE</div><div id="best-score" class="score-value">0</div></div>
    <div class="score-item"><div class="score-label">CAR STATUS</div><div id="status-text" style="font-size: 13px; font-weight: bold; color: #ffeb3b;">Ready</div></div>
</div>
<div id="game-container"><div id="board-grid"></div><div id="board-lines-h"></div><div id="board-outline"></div><div id="river"></div></div>
<div id="palette">
    <div class="palette-item piece-ui blue" data-side="blue" data-type="車">自車</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="卒">卒</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="士">士</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="馬">馬</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="象">象</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="車">車</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="将">将</div>
    <div class="palette-item piece-ui red" data-side="red" data-type="砲">砲</div>
    <div id="trash-can" class="reset-btn">🗑️</div>
</div>

<script>
    const container = document.getElementById('game-container');
    const scoreDisplay = document.getElementById('best-score');
    const statusDisplay = document.getElementById('status-text');
    const trashCan = document.getElementById('trash-can');
    const COLS = 8; const ROWS = 9; 
    let pieces = []; 
    let activeDrag = null;
    let draggedPieceId = null; // 【追加】移動元の駒を特定するためのID

    const DIRS_4 = [[0, -1],,, [-1, 0]]; 
    const DIAG_4 = [[1, -1],, [-1, 1], [-1, -1]];
    const HORSE_8 = [[1, -2], [2, -1],,, [-1, 2], [-2, 1], [-2, -1], [-1, -2]];

    function init() {
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                const dot = document.createElement('div');
                dot.className = 'point';
                dot.style.left = `${5 + (x / (COLS - 1)) * 90}%`;
                dot.style.top = `${5 + (y / (ROWS - 1)) * 90}%`;
                container.appendChild(dot);
            }
        }
        setupTouchEvents();
    }

    function setupTouchEvents() {
        document.querySelectorAll('.palette-item').forEach(el => {
            el.addEventListener('touchstart', (e) => handleDragStart(e, el.dataset.side, el.dataset.type), {passive: false});
        });
        trashCan.addEventListener('click', resetBoard);
        window.addEventListener('touchmove', (e) => { if (activeDrag) handleDragMove(e); }, {passive: false});
        window.addEventListener('touchend', (e) => { if (activeDrag) handleDragEnd(e); }, {passive: false});
        document.addEventListener('touchmove', (e) => { e.preventDefault(); }, {passive: false});
    }

    function handleDragStart(e, side, type, id = null) {
        e.preventDefault();
        const touch = e.touches[0];
        const pieceData = pieces.find(p => p.id === id);
        draggedPieceId = id; // 移動元を特定
        activeDrag = {
            side, type, id,
            startX: pieceData ? pieceData.x : -1,
            startY: pieceData ? pieceData.y : -1,
            element: createGhost(type, side, touch.clientX, touch.clientY)
        };
        render(); // 移動元を薄くするために再描画
    }

    function createGhost(type, side, x, y) {
        const ghost = document.createElement('div');
        ghost.className = `piece-ui ${side}`;
        ghost.innerText = type;
        ghost.style.position = 'fixed';
        ghost.style.left = x + 'px';
        ghost.style.top = y + 'px';
        ghost.style.transform = 'translate(-50%, -50%) scale(1.2)';
        ghost.style.opacity = '0.8';
        ghost.style.zIndex = '1000';
        ghost.style.pointerEvents = 'none';
        document.body.appendChild(ghost);
        return ghost;
    }

    function handleDragMove(e) {
        if (!activeDrag) return;
        const touch = e.touches[0];
        activeDrag.element.style.left = touch.clientX + 'px';
        activeDrag.element.style.top = touch.clientY + 'px';
        const trashRect = trashCan.getBoundingClientRect();
        if (touch.clientX >= trashRect.left && touch.clientX <= trashRect.right && touch.clientY >= trashRect.top && touch.clientY <= trashRect.bottom) trashCan.classList.add('drag-over');
        else trashCan.classList.remove('drag-over');
    }

    function handleDragEnd(e) {
        if (!activeDrag) return;
        const touch = e.changedTouches[0];
        const rect = container.getBoundingClientRect();
        const trashRect = trashCan.getBoundingClientRect();
        activeDrag.element.remove();
        trashCan.classList.remove('drag-over');
        if (touch.clientX >= trashRect.left && touch.clientX <= trashRect.right && touch.clientY >= trashRect.top && touch.clientY <= trashRect.bottom) {
            if (activeDrag.id) pieces = pieces.filter(p => p.id !== activeDrag.id);
        } else {
            const x = Math.round((((touch.clientX - rect.left) / rect.width) - 0.05) / 0.9 * (COLS - 1));
            const y = Math.round((((touch.clientY - rect.top) / rect.height) - 0.05) / 0.9 * (ROWS - 1));
            if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
                if (!(activeDrag.id && activeDrag.startX === x && activeDrag.startY === y)) {
                    if (activeDrag.side === 'blue') pieces = pieces.filter(p => p.side !== 'blue');
                    pieces = pieces.filter(p => !(p.x === x && p.y === y) && p.id !== activeDrag.id);
                    pieces.push({ id: activeDrag.id || Date.now(), side: activeDrag.side, type: activeDrag.type, x, y });
                }
            }
        }
        activeDrag = null;
        draggedPieceId = null; // IDをリセット
        render();
    }

    function resetBoard() { if(confirm("盤面をリセットしますか？")) { pieces = []; render(); } }

    function getAttackMap(currentPieces) {
        const attackMap = new Set();
        currentPieces.filter(p => p.side === 'red').forEach(p => {
            const add = (x, y) => { if(x>=0 && x<COLS && y>=0 && y<ROWS) attackMap.add(`${x},${y}`); };
            const checkAt = (x, y) => currentPieces.find(o => o.x === x && o.y === y);
            switch(p.type) {
                case '車': DIRS_4.forEach(([dx, dy]) => { for(let i=1; i<10; i++){ let nx=p.x+dx*i, ny=p.y+dy*i; if(nx<0||nx>=COLS||ny<0||ny>=ROWS) break; add(nx, ny); if(checkAt(nx, ny)) break; } }); break;
                case '馬': HORSE_8.forEach(([dx, dy]) => { const cx=dx===2||dx===-2?dx/2:0, cy=dy===2||dy===-2?dy/2:0; if(!currentPieces.some(pc=>pc.x===p.x+cx&&pc.y===p.y+cy)) add(p.x+dx, p.y+dy); }); break;
                case '砲': DIRS_4.forEach(([dx, dy]) => { let count=0; for(let i=1; i<10; i++){ let nx=p.x+dx*i, ny=p.y+dy*i; if(nx<0||nx>=COLS||ny<0||ny>=ROWS) break; const t=checkAt(nx, ny); if(count===0){ if(t) count=1; } else { add(nx, ny); if(t) break; } } }); break;
                case '卒': case '将': DIRS_4.forEach(([dx, dy]) => add(p.x+dx, p.y+dy)); break;
                case '象': DIAG_4.forEach(([dx, dy]) => { if(!currentPieces.some(pc=>pc.x===p.x+dx&&pc.y===p.y+dy)) add(p.x+dx*2, p.y+dy*2); }); break;
                case '士': DIAG_4.forEach(([dx, dy]) => add(p.x+dx, p.y+dy)); break;
            }
        });
        return attackMap;
    }

    function render() {
        container.querySelectorAll('.piece, .marker').forEach(el => el.remove());
        const currentAttackMap = getAttackMap(pieces);
        const myCar = pieces.find(p => p.side === 'blue');
        let carInDanger = false;
        pieces.forEach(p => {
            const el = document.createElement('div');
            el.className = `piece piece-ui ${p.side}`;
            if (p.side === 'blue' && currentAttackMap.has(`${p.x},${p.y}`)) { el.classList.add('danger-piece'); carInDanger = true; }
            el.innerText = p.type; 
            el.style.left = `${5 + (p.x / (COLS - 1)) * 90}%`; 
            el.style.top = `${5 + (p.y / (ROWS - 1)) * 90}%`;
            // 【追加】ドラッグ中なら半透明にする
            if (p.id === draggedPieceId) el.style.opacity = "0.3";
            el.addEventListener('touchstart', (e) => handleDragStart(e, p.side, p.type, p.id), {passive: false});
            container.appendChild(el);
        });
        statusDisplay.innerText = carInDanger ? "DANGER!" : (myCar ? "Stable" : "Place Car");
        statusDisplay.style.color = carInDanger ? "#ff4444" : "#4caf50";
        if (myCar) calculateAndShowMoves(myCar); else scoreDisplay.innerText = "0";
    }

    function calculateAndShowMoves(car) {
        const candidates = [];
        DIRS_4.forEach(([dx, dy]) => {
            for (let i = 1; i < 10; i++) {
                let nx = car.x+dx*i, ny = car.y+dy*i; if (nx<0||nx>=COLS||ny<0||ny>=ROWS) break;
                const target = pieces.find(p => p.x === nx && p.y === ny);
                if (target?.side === 'blue') break;
                const future = pieces.map(p => p.side === 'blue' ? { ...p, x: nx, y: ny } : p);
                const isSafe = !getAttackMap(future).has(`${nx},${ny}`);
                let score = isSafe ? 10 : 0;
                if (isSafe && target?.side === 'red') score += 1000;
                candidates.push({ x: nx, y: ny, isDanger: !isSafe, score });
                if (target) break;
            }
        });
        const maxScore = candidates.filter(c => !c.isDanger).length > 0 ? Math.max(...candidates.filter(c => !c.isDanger).map(c => c.score)) : 0;
        scoreDisplay.innerText = maxScore;
        candidates.forEach(c => {
            const marker = document.createElement('div');
            marker.className = `marker ${c.isDanger ? 'danger' : (c.score === maxScore && maxScore > 0 ? 'best' : 'safe')}`;
            marker.style.left = `${5 + (c.x/7) * 90}%`; marker.style.top = `${5 + (c.y/8) * 90}%`;
            container.appendChild(marker);
        });
    }
    init();
</script>
</body>
</html>
